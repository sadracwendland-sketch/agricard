<!DOCTYPE html>
<html>
<head><title>PPTX v2 - Logo Analyzer</title></head>
<body>
<div id="out" style="font-family:monospace;font-size:11px;white-space:pre;overflow:auto;max-height:99vh;"></div>
<div id="imgs"></div>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
const out = document.getElementById('out');
const log = msg => { out.textContent += msg + '\n'; console.log(msg.substring(0,900)); };

const SLIDE_W = 6858000;
const SLIDE_H = 12193588;
const emu2pct_w = e => ((e/SLIDE_W)*100).toFixed(2)+'%';
const emu2pct_h = e => ((e/SLIDE_H)*100).toFixed(2)+'%';
const emu2px_w  = e => ((e/SLIDE_W)*720).toFixed(0)+'px';
const emu2px_h  = e => ((e/SLIDE_H)*1280).toFixed(0)+'px';

async function main() {
  const res = await fetch('uploads/card_template_v2.pptx');
  const buf = await res.arrayBuffer();
  const zip = await JSZip.loadAsync(buf);

  log('=== FILES ===');
  Object.keys(zip.files).forEach(f => log(f));

  // Slide XML completo
  const slideXml = await zip.files['ppt/slides/slide1.xml'].async('string');
  log('\n=== SLIDE XML LENGTH: ' + slideXml.length);
  
  // Slide rels
  const slideRels = await zip.files['ppt/slides/_rels/slide1.xml.rels'].async('string');
  log('\n=== SLIDE RELS ===\n' + slideRels);

  // Parse shapes no slide
  log('\n=== SLIDE SHAPES ===');
  const parser = new DOMParser();
  const slideDoc = parser.parseFromString(slideXml, 'application/xml');
  
  // Shapes normais (sp)
  slideDoc.querySelectorAll('sp').forEach(sp => {
    const cNvPr = sp.querySelector('cNvPr');
    const ph    = sp.querySelector('ph');
    const xfrm  = sp.querySelector('spPr xfrm');
    const off   = xfrm?.querySelector('off');
    const ext   = xfrm?.querySelector('ext');
    const x = parseInt(off?.getAttribute('x')||0);
    const y = parseInt(off?.getAttribute('y')||0);
    const cx = parseInt(ext?.getAttribute('cx')||0);
    const cy = parseInt(ext?.getAttribute('cy')||0);
    log(`SP id=${cNvPr?.getAttribute('id')} name="${cNvPr?.getAttribute('name')}" phIdx=${ph?.getAttribute('idx')} type=${ph?.getAttribute('type')}`);
    if(cx) log(`  pos: x=${emu2pct_w(x)} y=${emu2pct_h(y)} w=${emu2pct_w(cx)} h=${emu2pct_h(cy)} | ${emu2px_w(x)},${emu2px_h(y)} ${emu2px_w(cx)}×${emu2px_h(cy)}`);
  });

  // Pictures (pic) no slide - onde está o logo
  log('\n=== SLIDE PICTURES (pic) ===');
  slideDoc.querySelectorAll('pic').forEach(pic => {
    const cNvPr = pic.querySelector('cNvPr');
    const blip  = pic.querySelector('blip');
    const xfrm  = pic.querySelector('spPr xfrm');
    const off   = xfrm?.querySelector('off');
    const ext   = xfrm?.querySelector('ext');
    const x  = parseInt(off?.getAttribute('x')||0);
    const y  = parseInt(off?.getAttribute('y')||0);
    const cx = parseInt(ext?.getAttribute('cx')||0);
    const cy = parseInt(ext?.getAttribute('cy')||0);
    log(`PIC id=${cNvPr?.getAttribute('id')} name="${cNvPr?.getAttribute('name')}" embed="${blip?.getAttribute('r:embed')||blip?.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','embed')}"`);
    log(`  pos: x=${emu2pct_w(x)} y=${emu2pct_h(y)} w=${emu2pct_w(cx)} h=${emu2pct_h(cy)} | ${emu2px_w(x)},${emu2px_h(y)} ${emu2px_w(cx)}×${emu2px_h(cy)}`);
  });
  
  // Layout shapes com pics
  log('\n=== LAYOUT PICTURES ===');
  const layoutXml = await zip.files['ppt/slideLayouts/slideLayout1.xml'].async('string');
  const layoutDoc = parser.parseFromString(layoutXml, 'application/xml');
  layoutDoc.querySelectorAll('pic').forEach(pic => {
    const cNvPr = pic.querySelector('cNvPr');
    const blip  = pic.querySelector('blip');
    const xfrm  = pic.querySelector('spPr xfrm');
    const off   = xfrm?.querySelector('off');
    const ext   = xfrm?.querySelector('ext');
    const x  = parseInt(off?.getAttribute('x')||0);
    const y  = parseInt(off?.getAttribute('y')||0);
    const cx = parseInt(ext?.getAttribute('cx')||0);
    const cy = parseInt(ext?.getAttribute('cy')||0);
    log(`PIC id=${cNvPr?.getAttribute('id')} name="${cNvPr?.getAttribute('name')}" embed="${blip?.getAttribute('r:embed')||blip?.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','embed')}"`);
    log(`  pos: x=${emu2pct_w(x)} y=${emu2pct_h(y)} w=${emu2pct_w(cx)} h=${emu2pct_h(cy)} | ${emu2px_w(x)},${emu2px_h(y)} ${emu2px_w(cx)}×${emu2px_h(cy)}`);
  });

  // SP com type=pic no slide e layout
  log('\n=== SP TYPE=PIC (placeholder imagem) ===');
  for(const [xml, label] of [[slideXml,'SLIDE'],[layoutXml,'LAYOUT']]) {
    const doc = parser.parseFromString(xml, 'application/xml');
    doc.querySelectorAll('sp').forEach(sp => {
      const ph = sp.querySelector('ph');
      if(ph?.getAttribute('type')==='pic') {
        const cNvPr = sp.querySelector('cNvPr');
        const xfrm  = sp.querySelector('spPr xfrm');
        const off   = xfrm?.querySelector('off');
        const ext   = xfrm?.querySelector('ext');
        const x  = parseInt(off?.getAttribute('x')||0);
        const y  = parseInt(off?.getAttribute('y')||0);
        const cx = parseInt(ext?.getAttribute('cx')||0);
        const cy = parseInt(ext?.getAttribute('cy')||0);
        log(`[${label}] SP(pic) id=${cNvPr?.getAttribute('id')} name="${cNvPr?.getAttribute('name')}" idx=${ph.getAttribute('idx')}`);
        if(cx) log(`  pos: x=${emu2pct_w(x)} y=${emu2pct_h(y)} w=${emu2pct_w(cx)} h=${emu2pct_h(cy)} | ${emu2px_w(x)} ${emu2px_h(y)} ${emu2px_w(cx)}×${emu2px_h(cy)}`);
        else log(`  (sem posição própria — herda do layout)`);
      }
    });
  }

  // Mostra todas as imagens
  log('\n=== ALL MEDIA ===');
  for(const [k,v] of Object.entries(zip.files)) {
    if(k.startsWith('ppt/media/') && !v.dir) {
      const blob = await v.async('blob');
      const url  = URL.createObjectURL(blob);
      log(`${k}: ${blob.size} bytes`);
      const img = document.createElement('img');
      img.src = url; img.style.cssText='max-width:200px;max-height:300px;display:inline-block;margin:5px;border:1px solid #ccc';
      img.alt = k;
      const label = document.createElement('div');
      label.textContent = k;
      label.style.fontSize = '10px';
      const wrap = document.createElement('div');
      wrap.style.display = 'inline-block';
      wrap.style.textAlign = 'center';
      wrap.appendChild(img);
      wrap.appendChild(label);
      document.getElementById('imgs').appendChild(wrap);
    }
  }

  log('\n=== DONE ===');
}
main().catch(e => { log('ERROR: '+e); console.error(e); });
</script>
</body>
</html>
