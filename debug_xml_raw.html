<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔬 Analisador XML Bruto PPTX</title>
<style>
  body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 20px; font-size: 12px; }
  h1 { color: #58a6ff; }
  .drop { border: 2px dashed #58a6ff; padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; margin-bottom: 16px; }
  .drop.over { background: rgba(88,166,255,.1); }
  .sec { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin-bottom: 12px; }
  .sec h2 { margin: 0 0 8px; color: #3fb950; font-size: 13px; }
  pre { background: #0d1117; padding: 8px; border-radius: 4px; overflow-x: auto; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  .ok { color: #3fb950; } .err { color: #f85149; } .warn { color: #d29922; }
  img { max-width: 200px; max-height: 200px; border: 1px solid #30363d; border-radius: 4px; margin: 4px; }
  canvas { border: 1px solid #30363d; border-radius: 4px; }
  input[type=file] { display:none; }
  .grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .card { background: #21262d; padding: 8px; border-radius: 4px; text-align: center; max-width: 200px; }
  .card small { display:block; color:#8b949e; word-break:break-all; font-size:10px; }
</style>
</head>
<body>
<h1>🔬 Analisador XML Bruto PPTX</h1>
<div class="drop" id="drop" onclick="document.getElementById('fi').click()">📁 Solte o PPTX aqui</div>
<input type="file" id="fi" accept=".pptx">
<div id="out"></div>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
const drop = document.getElementById('drop');
const out  = document.getElementById('out');

drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); const f = e.dataTransfer.files[0]; if (f) run(f); });
document.getElementById('fi').addEventListener('change', e => { if (e.target.files[0]) run(e.target.files[0]); });

function sec(title, html) { out.innerHTML += `<div class="sec"><h2>${title}</h2>${html}</div>`; }
function blobToDataUrl(blob) {
  return new Promise((res, rej) => { const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsDataURL(blob); });
}
function loadImage(src) {
  return new Promise((res, rej) => { const img = new Image(); img.crossOrigin='anonymous'; img.onload=()=>res(img); img.onerror=()=>rej(new Error('fail')); img.src=src; });
}

// Regex CORRIGIDA — sem aspa dentro de []
const MEDIA_REGEX = /Id="([^"]+)"[^>]*Target="[^"]*media\/([^"]+\.(png|jpg|jpeg|gif|bmp|webp))"/gi;

async function run(file) {
  out.innerHTML = '<div style="color:#58a6ff;padding:12px">⏳ Processando…</div>';
  try {
    const ab  = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(ab);
    out.innerHTML = `<h2 style="color:#58a6ff">${file.name} (${(file.size/1024/1024).toFixed(2)} MB)</h2>`;

    // ── Lista completa de arquivos ─────────────────────────
    const allFiles = [];
    zip.forEach((path, f) => { if (!f.dir) allFiles.push(path); });
    const mediaFiles = allFiles.filter(p => /^ppt\/media\//i.test(p) && /\.(png|jpg|jpeg|gif|bmp|webp)$/i.test(p));
    sec('📦 Mídia encontrada', `<b>${mediaFiles.length} arquivo(s):</b> ${mediaFiles.join(', ')}`);

    // ── Mostra TODAS as imagens de mídia ──────────────────
    let mediaHtml = '<div class="grid">';
    for (const mf of mediaFiles) {
      const blob = await zip.file(mf).async('blob');
      const du   = await blobToDataUrl(blob);
      mediaHtml += `<div class="card"><img src="${du}"><small>${mf.replace('ppt/media/','')} (${(blob.size/1024).toFixed(0)}KB)</small></div>`;
    }
    mediaHtml += '</div>';
    sec('🖼 Previews de todas as imagens', mediaHtml);

    // ── Master RELS ───────────────────────────────────────
    const masterRels = await zip.file('ppt/slideMasters/_rels/slideMaster1.xml.rels')?.async('text') || '';
    sec('📄 slideMaster1.xml.rels (BRUTO)', `<pre>${masterRels}</pre>`);

    // Testa a regex CORRIGIDA
    const masterMatches = [...masterRels.matchAll(MEDIA_REGEX)];
    sec(`🔍 Matches no master.rels (regex corrigida)`,
      masterMatches.length
        ? `<span class="ok">✅ ${masterMatches.length} match(es):</span><pre>${masterMatches.map(m => `rId=${m[1]} → media/${m[2]}`).join('\n')}</pre>`
        : `<span class="err">❌ Nenhum match! Regex não encontrou imagens.</span>`
    );

    // ── Master XML — busca p:bg ───────────────────────────
    const masterXml = await zip.file('ppt/slideMasters/slideMaster1.xml')?.async('text') || '';
    const bgSection = masterXml.match(/<p:bg[\s\S]*?<\/p:bg>/)?.[0] || '(não encontrado)';
    sec('📄 Seção <p:bg> no slideMaster', `<pre>${bgSection.substring(0, 2000)}</pre>`);

    // Testa getElementsByTagNameNS no masterXml
    const masterDoc = new DOMParser().parseFromString(masterXml, 'text/xml');
    const bgEls = Array.from(masterDoc.getElementsByTagNameNS('*', 'bg'));
    const bgPicEls = Array.from(masterDoc.getElementsByTagNameNS('*', 'pic'));
    sec('🔍 Elementos no masterXml via getElementsByTagNameNS', `
      <span class="${bgEls.length ? 'ok' : 'warn'}">p:bg encontrados: ${bgEls.length}</span><br>
      <span class="${bgPicEls.length ? 'ok' : 'warn'}">p:pic encontrados: ${bgPicEls.length}</span>
      ${bgEls.length ? '<br><br><b>Conteúdo do p:bg[0]:</b><pre>' + bgEls[0].outerHTML?.substring(0,1000) + '</pre>' : ''}
      ${bgPicEls.length ? '<br><b>p:pic[0] spPr:</b><pre>' + (bgPicEls[0].getElementsByTagNameNS('*','spPr')[0]?.outerHTML || '(sem spPr)').substring(0,800) + '</pre>' : ''}
    `);

    // ── Layout RELS ───────────────────────────────────────
    const s1Rels     = await zip.file('ppt/slides/_rels/slide1.xml.rels')?.async('text') || '';
    const layoutM    = s1Rels.match(/Type="[^"]*slideLayout"[^>]*Target="([^"]+)"/);
    const layoutFile = layoutM ? layoutM[1].replace(/^\.\.\//, 'ppt/') : 'ppt/slideLayouts/slideLayout1.xml';
    const layoutRelsF = layoutFile.replace('slideLayouts/', 'slideLayouts/_rels/').replace('.xml', '.xml.rels');
    const layoutRels  = await zip.file(layoutRelsF)?.async('text') || '';
    const layoutXml   = await zip.file(layoutFile)?.async('text') || '';

    sec(`📄 Layout usado: ${layoutFile}`, '');
    sec('📄 layoutRels (BRUTO)', `<pre>${layoutRels}</pre>`);

    const layoutMatches = [...layoutRels.matchAll(MEDIA_REGEX)];
    sec(`🔍 Matches no layout.rels`,
      layoutMatches.length
        ? `<span class="ok">✅ ${layoutMatches.length} match(es):</span><pre>${layoutMatches.map(m => `rId=${m[1]} → media/${m[2]}`).join('\n')}</pre>`
        : `<span class="warn">⚠️ Nenhum match no layout</span>`
    );

    // ── slide1 RELS ───────────────────────────────────────
    const slide1RelsMatches = [...s1Rels.matchAll(MEDIA_REGEX)];
    sec('📄 slide1.rels (BRUTO)', `<pre>${s1Rels}</pre>`);
    sec(`🔍 Matches no slide1.rels`,
      slide1RelsMatches.length
        ? `<span class="ok">✅ ${slide1RelsMatches.length} match(es)</span>`
        : `<span class="warn">⚠️ Nenhum match</span>`
    );

    // ── SIMULAÇÃO COMPLETA ────────────────────────────────
    // Testa todo o pipeline de extração
    const presXml = await zip.file('ppt/presentation.xml')?.async('text') || '';
    const sldSzM  = presXml.match(/<p:sldSz[^>]+cx="(\d+)"[^>]+cy="(\d+)"/);
    const slideW  = sldSzM ? parseInt(sldSzM[1]) : 6858000;
    const slideH  = sldSzM ? parseInt(sldSzM[2]) : 12193588;

    // Extrai background
    let bgDataUrl = null;
    let bgSource  = '';

    // 1. Via p:bg blipFill
    const rIdToFile = {};
    for (const m of masterRels.matchAll(MEDIA_REGEX)) {
      rIdToFile[m[1]] = `ppt/media/${m[2].split('/').pop()}`;
    }
    for (const bgEl of bgEls) {
      const blips = bgEl.getElementsByTagNameNS('*', 'blip');
      const blip  = blips[0]; if (!blip) continue;
      let rId = '';
      for (const a of Array.from(blip.attributes)) { if (a.localName === 'embed') { rId = a.value; break; } }
      if (rId && rIdToFile[rId]) {
        const f = zip.file(rIdToFile[rId]);
        if (f) { bgDataUrl = await blobToDataUrl(await f.async('blob')); bgSource = `p:bg blipFill → ${rIdToFile[rId]}`; break; }
      }
    }

    // 2. Via maior PIC no master
    if (!bgDataUrl && bgPicEls.length) {
      let best = null, bestSize = 0;
      for (const pic of bgPicEls) {
        const blips = pic.getElementsByTagNameNS('*', 'blip');
        const blip  = blips[0]; if (!blip) continue;
        let rId = '';
        for (const a of Array.from(blip.attributes)) { if (a.localName === 'embed') { rId = a.value; break; } }
        if (!rId || !rIdToFile[rId]) continue;
        const f = zip.file(rIdToFile[rId]); if (!f) continue;
        const blob = await f.async('blob');
        if (blob.size > bestSize) { bestSize = blob.size; best = { f, fname: rIdToFile[rId] }; }
      }
      if (best) { bgDataUrl = await blobToDataUrl(await best.f.async('blob')); bgSource = `maior PIC no master → ${best.fname}`; }
    }

    // 3. Maior imagem do rels
    if (!bgDataUrl && Object.keys(rIdToFile).length) {
      const entries = [];
      for (const [rId, fname] of Object.entries(rIdToFile)) {
        const f = zip.file(fname); if (!f) continue;
        const blob = await f.async('blob');
        entries.push({ fname, blob });
      }
      if (entries.length) {
        const best = entries.sort((a,b)=>b.blob.size-a.blob.size)[0];
        bgDataUrl = await blobToDataUrl(best.blob);
        bgSource  = `maior imagem do rels → ${best.fname}`;
      }
    }

    if (bgDataUrl) {
      sec(`✅ Background extraído (${bgSource})`, `<img src="${bgDataUrl}">`);
    } else {
      sec('❌ Background NÃO extraído', `<span class="err">Nenhuma imagem encontrada no master. Verifique os rels acima.</span>`);
    }

    // Renderização final
    if (bgDataUrl) {
      const canvas = document.createElement('canvas');
      canvas.width = 400; canvas.height = Math.round(400 * slideH / slideW);
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const bg = await loadImage(bgDataUrl);
      ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
      sec('🎨 Canvas com fundo', canvas.outerHTML);
    }

  } catch(e) {
    out.innerHTML += `<div class="err">❌ ${e.message}<br><pre>${e.stack}</pre></div>`;
  }
}
</script>
</body>
</html>
