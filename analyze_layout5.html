<!DOCTYPE html>
<html>
<head><title>Layout5 Full</title></head>
<body>
<div id="out" style="font-family:monospace;font-size:10px;white-space:pre;overflow:auto;max-height:99vh;"></div>
<div id="imgs"></div>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
const out = document.getElementById('out');
const log = msg => { out.textContent += msg + '\n'; console.log(msg.substring(0,900)); };

const SLIDE_W = 6858000;
const SLIDE_H = 12193588;
const p_w = e => ((e/SLIDE_W)*100).toFixed(2)+'%';
const p_h = e => ((e/SLIDE_H)*100).toFixed(2)+'%';
const px_w = e => ((e/SLIDE_W)*720).toFixed(1);
const px_h = e => ((e/SLIDE_H)*1280).toFixed(1);

async function main() {
  const res = await fetch('uploads/card_template_v2.pptx');
  const buf = await res.arrayBuffer();
  const zip = await JSZip.loadAsync(buf);

  // Layout 5 full XML
  log('=== LAYOUT5 FULL XML ===');
  const l5 = await zip.files['ppt/slideLayouts/slideLayout5.xml'].async('string');
  log('Length: ' + l5.length);
  // print in chunks
  for(let i=0;i<l5.length;i+=3000) log('CHUNK'+Math.floor(i/3000)+': '+l5.substring(i,i+3000));

  // Layout5 rels
  const l5rels = await zip.files['ppt/slideLayouts/_rels/slideLayout5.xml.rels'].async('string');
  log('\n=== LAYOUT5 RELS ===\n'+l5rels);

  // Parse all SP placeholders in layout5
  log('\n=== LAYOUT5 PARSED SHAPES ===');
  const parser = new DOMParser();
  const doc = parser.parseFromString(l5, 'application/xml');
  doc.querySelectorAll('sp').forEach(sp => {
    const cNvPr = sp.querySelector('cNvPr');
    const ph    = sp.querySelector('ph');
    const xfrm  = sp.querySelector('spPr xfrm');
    const off   = xfrm?.querySelector('off');
    const ext   = xfrm?.querySelector('ext');
    const x  = parseInt(off?.getAttribute('x')||0);
    const y  = parseInt(off?.getAttribute('y')||0);
    const cx = parseInt(ext?.getAttribute('cx')||0);
    const cy = parseInt(ext?.getAttribute('cy')||0);
    const defRpr = sp.querySelector('defRPr');
    const sz = defRpr?.getAttribute('sz');
    const b  = defRpr?.getAttribute('b');
    const srgb = defRpr?.querySelector('solidFill srgbClr')?.getAttribute('val');
    const scheme = defRpr?.querySelector('solidFill schemeClr')?.getAttribute('val');
    const latin  = defRpr?.querySelector('latin')?.getAttribute('typeface');
    const algn   = sp.querySelector('lvl5pPr,lvl1pPr,lvl2pPr')?.getAttribute('algn')||
                   sp.querySelector('pPr')?.getAttribute('algn');
    log(`\nSP id=${cNvPr?.getAttribute('id')} name="${cNvPr?.getAttribute('name')}" phType=${ph?.getAttribute('type')} phIdx=${ph?.getAttribute('idx')}`);
    if(cx||x) log(`  px: x=${px_w(x)},y=${px_h(y)} w=${px_w(cx)}×h=${px_h(cy)} | %: ${p_w(x)} ${p_h(y)} ${p_w(cx)}×${p_h(cy)}`);
    if(sz||srgb||latin) log(`  font: sz=${sz?parseInt(sz)/100+'pt':'-'} bold=${b} color=${srgb?'#'+srgb:scheme||'-'} face="${latin||'-'}" algn=${algn}`);
  });
  
  // All media: show images
  log('\n=== IMAGES ===');
  for(const name of ['ppt/media/image1.png','ppt/media/image2.png','ppt/media/image6.png']) {
    if(zip.files[name]) {
      const blob = await zip.files[name].async('blob');
      const url = URL.createObjectURL(blob);
      log(name+': '+blob.size+' bytes → '+url);
      const img = document.createElement('img');
      img.src = url;
      img.style.cssText = 'max-width:240px;max-height:400px;display:inline-block;margin:8px;border:2px solid #ccc;';
      img.alt = name;
      const lbl = document.createElement('div');
      lbl.textContent = name + ' ('+blob.size+' bytes)';
      lbl.style.fontSize='10px';
      const w = document.createElement('div');
      w.style.display='inline-block'; w.style.textAlign='center';
      w.appendChild(img); w.appendChild(lbl);
      document.getElementById('imgs').appendChild(w);
    }
  }
  
  log('\n=== DONE ===');
}
main().catch(e=>{log('ERROR: '+e);console.error(e);});
</script>
</body>
</html>
