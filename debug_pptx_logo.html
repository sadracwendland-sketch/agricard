<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔍 Diagnóstico PPTX v2 – Namespace-Safe</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
  h1 { color: #4fc3f7; }
  .drop { border: 2px dashed #4fc3f7; padding: 40px; text-align: center; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
  .drop.over { background: rgba(79,195,247,.15); }
  .section { background: #1e1e1e; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
  .section h2 { margin: 0 0 10px; color: #81c784; font-size: 14px; }
  .ok  { color: #81c784; } .err { color: #ef9a9a; } .warn { color: #ffcc80; }
  pre { white-space: pre-wrap; word-break: break-all; font-size: 11px; max-height: 200px; overflow-y:auto; background:#0a0a0a; padding:8px; border-radius:4px; }
  .img-row { display:flex; flex-wrap:wrap; gap:12px; }
  .img-card { background:#263238; padding:8px; border-radius:6px; text-align:center; max-width:180px; }
  .img-card img { max-width:160px; max-height:160px; display:block; margin:0 auto 4px; }
  .img-card small { color:#aaa; font-size:10px; word-break:break-all; }
  input[type=file] { display:none; }
  button { background:#1976d2; color:#fff; border:none; padding:8px 18px; border-radius:4px; cursor:pointer; margin:4px; }
  canvas { border:1px solid #555; border-radius:4px; }
  .result-canvas { margin-top:12px; }
</style>
</head>
<body>
<h1>🔍 Diagnóstico PPTX v2</h1>
<p style="color:#aaa">Testa a extração de imagens com namespace-safe (getElementsByTagNameNS).</p>

<div class="drop" id="drop" onclick="document.getElementById('fi').click()">
  📁 Arraste o PPTX aqui ou clique para selecionar
</div>
<input type="file" id="fi" accept=".pptx">

<div id="output"></div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
const drop = document.getElementById('drop');
const out  = document.getElementById('output');

drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); const f = e.dataTransfer.files[0]; if (f) run(f); });
document.getElementById('fi').addEventListener('change', e => { if (e.target.files[0]) run(e.target.files[0]); });

function blobToDataUrl(blob) {
  return new Promise((res, rej) => { const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsDataURL(blob); });
}

function section(title, html) {
  out.innerHTML += `<div class="section"><h2>${title}</h2>${html}</div>`;
}

function imgCard(src, label) {
  return `<div class="img-card"><img src="${src}"><small>${label}</small></div>`;
}

async function extractBgFromMaster(zip, masterRels) {
  const rIdToFile = {};
  const imgRels = [...masterRels.matchAll(/Id="([^"]+)"[^>]*Target="[^"]*media\/([^"?#]+\.(png|jpg|jpeg|gif|bmp|webp))"/gi)];
  for (const rel of imgRels) { rIdToFile[rel[1]] = `ppt/media/${rel[2].split('/').pop()}`; }
  if (!Object.keys(rIdToFile).length) return null;

  const masterXml = await zip.file('ppt/slideMasters/slideMaster1.xml')?.async('text') || '';
  if (masterXml) {
    const doc = new DOMParser().parseFromString(masterXml, 'text/xml');
    const bgs = Array.from(doc.getElementsByTagNameNS('*', 'bg'));
    for (const bg of bgs) {
      const blips = bg.getElementsByTagNameNS('*', 'blip');
      const blip = blips[0];
      if (!blip) continue;
      let rId = '';
      for (const attr of Array.from(blip.attributes)) { if (attr.localName === 'embed') { rId = attr.value; break; } }
      if (rId && rIdToFile[rId]) {
        const f = zip.file(rIdToFile[rId]);
        if (f) { console.log('Fundo via p:bg:', rIdToFile[rId]); return { dataUrl: await blobToDataUrl(await f.async('blob')), fname: rIdToFile[rId], source: 'p:bg blipFill' }; }
      }
    }
  }

  const entries = [];
  for (const [rId, fname] of Object.entries(rIdToFile)) {
    const f = zip.file(fname); if (!f) continue;
    const blob = await f.async('blob');
    entries.push({ fname, blob, rId });
  }
  if (!entries.length) return null;
  const best = entries.sort((a,b) => b.blob.size - a.blob.size)[0];
  return { dataUrl: await blobToDataUrl(best.blob), fname: best.fname, source: 'maior imagem do master' };
}

async function extractImagesWithPositions(zip, xml, relsText) {
  if (!xml || !relsText) return [];
  const rIdToFile = {};
  const imgRels = [...relsText.matchAll(/Id="([^"]+)"[^>]*Target="[^"]*media\/([^"?#]+\.(png|jpg|jpeg|gif|bmp|webp))"/gi)];
  for (const rel of imgRels) { rIdToFile[rel[1]] = `ppt/media/${rel[2].split('/').pop()}`; }
  if (!Object.keys(rIdToFile).length) return [];

  const doc  = new DOMParser().parseFromString(xml, 'text/xml');
  const pics = Array.from(doc.getElementsByTagNameNS('*', 'pic'));
  const images = [];

  for (const pic of pics) {
    const spPr  = pic.getElementsByTagNameNS('*', 'spPr')[0];
    const xfrm  = spPr?.getElementsByTagNameNS('*', 'xfrm')[0];
    const off   = xfrm?.getElementsByTagNameNS('*', 'off')[0];
    const ext   = xfrm?.getElementsByTagNameNS('*', 'ext')[0];
    if (!off || !ext) { console.log('PIC sem xfrm'); continue; }
    const x = parseInt(off.getAttribute('x') || '0');
    const y = parseInt(off.getAttribute('y') || '0');
    const cx = parseInt(ext.getAttribute('cx') || '0');
    const cy = parseInt(ext.getAttribute('cy') || '0');
    if (cx <= 0 || cy <= 0) continue;

    const blip = pic.getElementsByTagNameNS('*', 'blip')[0];
    if (!blip) continue;
    let rId = '';
    for (const attr of Array.from(blip.attributes)) { if (attr.localName === 'embed') { rId = attr.value; break; } }
    if (!rId) continue;

    const fname = rIdToFile[rId];
    if (!fname) continue;
    const f = zip.file(fname); if (!f) continue;
    const blob = await f.async('blob');
    images.push({ dataUrl: await blobToDataUrl(blob), x, y, cx, cy, rId, fname, size: blob.size });
  }
  return images;
}

async function renderFullSlide(slideW, slideH, bgData, allImages, outputW = 600) {
  const aspect = slideH / slideW;
  const W = outputW, H = Math.round(W * aspect);
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  if (bgData) {
    try {
      const bg = await loadImage(bgData);
      ctx.drawImage(bg, 0, 0, W, H);
    } catch(e) { ctx.fillStyle = '#1a3a1a'; ctx.fillRect(0,0,W,H); }
  }

  const EMU = 914400/96;
  const sX = W/(slideW/EMU), sY = H/(slideH/EMU);
  for (const img of allImages) {
    try {
      const image = await loadImage(img.dataUrl);
      const px = Math.round((img.x/EMU)*sX);
      const py = Math.round((img.y/EMU)*sY);
      const pw = Math.round((img.cx/EMU)*sX);
      const ph = Math.round((img.cy/EMU)*sY);
      if (pw > 0 && ph > 0) ctx.drawImage(image, px, py, pw, ph);
    } catch(e) {}
  }
  return canvas;
}

function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image(); img.crossOrigin='anonymous';
    img.onload = () => res(img);
    img.onerror = () => rej(new Error('img load fail'));
    img.src = src;
  });
}

async function run(file) {
  out.innerHTML = '<div style="color:#4fc3f7;padding:16px">⏳ Analisando…</div>';
  try {
    const ab  = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(ab);
    out.innerHTML = '';

    // Dimensões
    const presXml = await zip.file('ppt/presentation.xml')?.async('text') || '';
    const sldSzM  = presXml.match(/<p:sldSz[^>]+cx="(\d+)"[^>]+cy="(\d+)"/);
    const slideW  = sldSzM ? parseInt(sldSzM[1]) : 6858000;
    const slideH  = sldSzM ? parseInt(sldSzM[2]) : 12193588;
    section('📐 Dimensões', `slideW=${slideW} EMU | slideH=${slideH} EMU | Aspecto=${(slideH/slideW).toFixed(3)}`);

    // Layout
    const s1Rels    = await zip.file('ppt/slides/_rels/slide1.xml.rels')?.async('text') || '';
    const layoutM   = s1Rels.match(/Type="[^"]*slideLayout"[^>]*Target="([^"]+)"/);
    const layoutFile = layoutM ? layoutM[1].replace(/^\.\.\//, 'ppt/') : 'ppt/slideLayouts/slideLayout1.xml';
    const layoutXml  = await zip.file(layoutFile)?.async('text') || '';
    const layoutRelsF = layoutFile.replace('slideLayouts/', 'slideLayouts/_rels/').replace('.xml', '.xml.rels');
    const layoutRels  = await zip.file(layoutRelsF)?.async('text') || '';

    // Master
    const masterRels = await zip.file('ppt/slideMasters/_rels/slideMaster1.xml.rels')?.async('text') || '';
    const masterXml  = await zip.file('ppt/slideMasters/slideMaster1.xml')?.async('text') || '';

    // Slide1
    const slide1Xml  = await zip.file('ppt/slides/slide1.xml')?.async('text') || '';

    // ─── EXTRAÇÃO BACKGROUND ───
    const bgResult = await extractBgFromMaster(zip, masterRels);
    if (bgResult) {
      section('🖼 Background (master)', `<div class="ok">✅ Encontrado via: ${bgResult.source}</div><div class="ok">Arquivo: ${bgResult.fname}</div><div class="img-row">${imgCard(bgResult.dataUrl, bgResult.fname.replace('ppt/media/',''))}</div>`);
    } else {
      section('🖼 Background (master)', '<div class="err">❌ Não encontrado!</div>');
    }

    // ─── EXTRAÇÃO IMAGENS FIXAS ───
    const masterImages = await extractImagesWithPositions(zip, masterXml, masterRels);
    const layoutImages = await extractImagesWithPositions(zip, layoutXml, layoutRels);
    const slide1Images = await extractImagesWithPositions(zip, slide1Xml, s1Rels);

    const seen = new Set();
    const allImages = [];
    for (const img of [...masterImages, ...layoutImages, ...slide1Images]) {
      if (seen.has(img.fname)) continue; seen.add(img.fname); allImages.push(img);
    }

    let imgsHtml = `Master: ${masterImages.length} | Layout: ${layoutImages.length} | Slide1: ${slide1Images.length} | Total único: ${allImages.length}<br><div class="img-row">`;
    for (const img of allImages) {
      const EMU = 914400/96;
      const xPct = ((img.x/EMU)/(slideW/EMU)*100).toFixed(1);
      const yPct = ((img.y/EMU)/(slideH/EMU)*100).toFixed(1);
      imgsHtml += imgCard(img.dataUrl, `${img.fname.replace('ppt/media/','')}<br>${(img.size/1024).toFixed(0)}KB x=${xPct}% y=${yPct}%`);
    }
    imgsHtml += '</div>';

    if (allImages.length === 0) {
      imgsHtml += '<div class="err">❌ Nenhuma imagem com posição encontrada nos PICs!</div>';
    }
    section('🖼 Imagens Fixas (com posição EMU)', imgsHtml);

    // ─── RENDERIZAÇÃO COMPLETA ───
    if (bgResult) {
      const canvas = await renderFullSlide(slideW, slideH, bgResult.dataUrl, allImages, 400);
      section('✅ Slide Renderizado (simulação)', `<div class="result-canvas">${canvas.outerHTML}</div><div style="margin-top:8px;color:#aaa;font-size:11px">Este é o template_image que será salvo na variedade</div>`);
    }

    // ─── PLACEHOLDERS DETECTADOS ───
    const doc  = new DOMParser().parseFromString(layoutXml, 'text/xml');
    const sps  = Array.from(doc.getElementsByTagNameNS('*', 'sp'));
    const phs  = [];
    for (const sp of sps) {
      const cNvPr = sp.getElementsByTagNameNS('*', 'cNvPr')[0];
      const name  = cNvPr?.getAttribute('name') || '';
      const matches = [...name.matchAll(/\{\{(\w+)\}\}/g)];
      if (matches.length) phs.push(...matches.map(m => `{{${m[1]}}}`));
    }
    const uniqPhs = [...new Set(phs)];
    section('📝 Placeholders de texto detectados', uniqPhs.length
      ? `<span class="ok">✅ ${uniqPhs.length} placeholder(s): ${uniqPhs.join(', ')}</span>`
      : `<span class="warn">⚠️ Nenhum placeholder detectado. Verifique os nomes das caixas no PPTX (use {{campo}}).</span>`);

    // ─── TODOS OS ARQUIVOS DE MÍDIA ───
    const mediaFiles = [];
    zip.forEach((path, f) => { if (!f.dir && path.startsWith('ppt/media/') && /\.(png|jpg|jpeg|gif|bmp|webp)$/i.test(path)) mediaFiles.push({ path, f }); });

    let mediaHtml = `<b>${mediaFiles.length} arquivo(s) de mídia total:</b><div class="img-row">`;
    for (const mf of mediaFiles) {
      const blob = await mf.f.async('blob');
      const du = await blobToDataUrl(blob);
      mediaHtml += imgCard(du, `${mf.path.replace('ppt/media/','')} (${(blob.size/1024).toFixed(0)}KB)`);
    }
    mediaHtml += '</div>';
    section('📦 Todos os arquivos de mídia', mediaHtml);

  } catch(err) {
    out.innerHTML = `<div class="err">❌ ${err.message}<br><pre>${err.stack}</pre></div>`;
  }
}
</script>
</body>
</html>
