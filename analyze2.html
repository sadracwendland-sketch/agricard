<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>PPTX Auto Analyzer</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  body { font-family: monospace; font-size: 11px; background:#111; color:#ddd; padding:16px; margin:0; }
  pre  { background:#1a1a1a; padding:10px; border-radius:4px; overflow:auto; white-space:pre-wrap; word-break:break-all; max-height:500px; }
  .ok  { color:#4CAF50; } .warn { color:#FF9800; } .err { color:#f44336; }
  .ph  { color:#FFD54F; font-weight:bold; }
  .sec { background:#1e1e1e; margin:8px 0; padding:10px; border-radius:6px; border-left:3px solid #4CAF50; }
</style>
</head>
<body>
<div id="out"><span class="ok">Carregando PPTX...</span></div>
<script>
(async () => {
  const out = document.getElementById('out');
  const log = (...a) => { out.innerHTML += '\n' + a.join(' '); };

  try {
    const res  = await fetch('uploads/card_template.pptx');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const ab   = await res.arrayBuffer();
    log('<span class="ok">✅ PPTX carregado: ' + ab.byteLength + ' bytes</span>');

    const zip = await JSZip.loadAsync(ab);
    const files = Object.keys(zip.files);
    log('<span class="ok">📦 Arquivos no ZIP: ' + files.length + '</span>');

    // Slide list
    const slideFiles = files.filter(f => /^ppt\/slides\/slide\d+\.xml$/.test(f))
                            .sort((a,b)=>parseInt(a.match(/\d+/))-parseInt(b.match(/\d+/)));
    log('📄 Slides: ' + slideFiles.join(', '));

    // Presentation dimensions
    const presXml = await zip.file('ppt/presentation.xml')?.async('text') || '';
    const sz = presXml.match(/sldSz[^>]+cx="(\d+)"[^>]+cy="(\d+)"/);
    const W  = sz ? +sz[1] : 9144000;
    const H  = sz ? +sz[2] : 5143500;
    const Wpx = Math.round(W/914400*96*2.54*96/96); // at 96dpi
    const Hpx = Math.round(H/914400*96*2.54*96/96);
    const WPX = Math.round(W/12700); // EMU to pt: 1pt=12700 EMU; 1px@96dpi=9525 EMU
    const HPX = Math.round(H/9525);
    log('<span class="ok">📐 Slide: ' + W + ' × ' + H + ' EMU = ~' + Math.round(W/9525) + ' × ' + Math.round(H/9525) + ' px @96dpi</span>');

    // Media files
    const media = files.filter(f=>f.startsWith('ppt/media/'));
    log('🖼️ Media: ' + media.join(' | '));

    // Analyze slide 1
    const slide1 = await zip.file(slideFiles[0])?.async('text') || '';
    log('\n<span class="warn">═══════ SLIDE 1 XML ANALYSIS ═══════</span>');

    // Quick regex scan for placeholders
    const phMatches = [...slide1.matchAll(/\{\{(\w+)\}\}/g)];
    const uniquePH  = [...new Set(phMatches.map(m=>m[1]))];
    log('<span class="ph">🎯 PLACEHOLDERS FOUND: ' + uniquePH.join(', ') + '</span>');

    // Parse XML
    const parser = new DOMParser();
    const doc    = parser.parseFromString(slide1, 'text/xml');
    const EMU    = 9525; // 1px @96dpi

    // All sp shapes
    const shapes = [...doc.querySelectorAll('sp')];
    log('\n📦 Total shapes (sp): ' + shapes.length);

    const results = [];
    shapes.forEach((sp, i) => {
      const xfrm = sp.querySelector('spPr xfrm');
      if (!xfrm) return;
      const off = xfrm.querySelector('off'), ext = xfrm.querySelector('ext');
      if (!off||!ext) return;
      const x=+off.getAttribute('x'), y=+off.getAttribute('y'),
            w=+ext.getAttribute('cx'), h=+ext.getAttribute('cy');
      const rot = parseFloat(xfrm.getAttribute('rot')||0)/60000;

      // All runs
      const runData = [];
      sp.querySelectorAll('r').forEach(r => {
        const tEl = r.querySelector('t'); if (!tEl) return;
        const rPr = r.querySelector('rPr');
        const latin = rPr?.querySelector('latin');
        const sc = rPr?.querySelector('solidFill srgbClr');
        const schClr = rPr?.querySelector('solidFill schemeClr');
        const sz  = rPr?.getAttribute('sz');
        runData.push({
          text:   tEl.textContent,
          sz:     sz ? +sz/100 : null,
          bold:   rPr?.getAttribute('b')==='1',
          italic: rPr?.getAttribute('i')==='1',
          font:   latin?.getAttribute('typeface')||null,
          color:  sc ? '#'+sc.getAttribute('val') : schClr ? 'scheme:'+schClr.getAttribute('val') : null,
          u:      rPr?.getAttribute('u'),
        });
      });

      const rawText = runData.map(r=>r.text).join('');
      const pPr = sp.querySelector('pPr');
      const algn = pPr?.getAttribute('algn')||'l';
      const alignMap = {l:'left',ctr:'center',r:'right',just:'justify'};

      const fillSc = sp.querySelector('spPr solidFill srgbClr');
      const fillColor = fillSc ? '#'+fillSc.getAttribute('val') : null;

      const bodyPr = sp.querySelector('bodyPr');
      const lIns = bodyPr?.getAttribute('lIns'), rIns = bodyPr?.getAttribute('rIns'),
            tIns = bodyPr?.getAttribute('tIns'), bIns = bodyPr?.getAttribute('bIns');

      const isPH = /\{\{/.test(rawText);

      const s = {
        idx: i, isPH, rawText,
        x, y, w, h, rot,
        xpx: Math.round(x/EMU), ypx: Math.round(y/EMU),
        wpx: Math.round(w/EMU), hpx: Math.round(h/EMU),
        xpct: +(x/W*100).toFixed(2), ypct: +(y/H*100).toFixed(2),
        wpct: +(w/W*100).toFixed(2), hpct: +(h/H*100).toFixed(2),
        align: alignMap[algn]||'left', fillColor,
        lIns: lIns?Math.round(+lIns/EMU):null,
        tIns: tIns?Math.round(+tIns/EMU):null,
        runs: runData,
      };
      results.push(s);

      if (isPH) {
        log(`\n<span class="ph">⭐ PH [${i}]: "${rawText.substring(0,100)}"</span>
  pos: x=${s.xpx}px y=${s.ypx}px w=${s.wpx}px h=${s.hpx}px
  %:   x=${s.xpct}% y=${s.ypct}% w=${s.wpct}% h=${s.hpct}%
  align: ${s.align}  fill: ${fillColor||'none'}  lIns: ${s.lIns}px  tIns: ${s.tIns}px
  runs: ${JSON.stringify(runData,null,2)}`);
      }
    });

    // Images
    log('\n<span class="warn">═══ IMAGES (pic) ═══</span>');
    [...doc.querySelectorAll('pic')].forEach((pic,i)=>{
      const xfrm=pic.querySelector('spPr xfrm'); if(!xfrm) return;
      const off=xfrm.querySelector('off'),ext=xfrm.querySelector('ext'); if(!off||!ext) return;
      const x=+off.getAttribute('x'),y=+off.getAttribute('y'),w=+ext.getAttribute('cx'),h=+ext.getAttribute('cy');
      const blip=pic.querySelector('blip');
      const rEmbed=blip?.getAttribute('r:embed')||blip?.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','embed');
      log(`IMG [${i}]: x=${Math.round(x/EMU)}px y=${Math.round(y/EMU)}px w=${Math.round(w/EMU)}px h=${Math.round(h/EMU)}px rEmbed=${rEmbed}`);
    });

    // Background shape (bg)
    const bgSolidFill = doc.querySelector('bg solidFill srgbClr, bgPr solidFill srgbClr');
    if (bgSolidFill) log('Background solid fill: #'+bgSolidFill.getAttribute('val'));

    // Rels
    const relXml = await zip.file('ppt/slides/_rels/slide1.xml.rels')?.async('text')||'';
    log('\n<span class="warn">═══ RELS slide1 ═══</span>');
    log(relXml);

    // JSON dump of all shapes
    log('\n<span class="warn">═══ JSON COMPLETO ═══</span>');
    log('<pre>' + JSON.stringify({
      slideW: W, slideH: H,
      slideWpx: Math.round(W/EMU), slideHpx: Math.round(H/EMU),
      placeholders: uniquePH,
      shapes: results
    }, null, 2) + '</pre>');

    // Raw XML (first 20k chars)
    log('\n<span class="warn">═══ RAW XML (primeiros 30k) ═══</span>');
    log('<pre>' + slide1.substring(0,30000).replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>');

  } catch(e) {
    log('<span class="err">❌ Erro: ' + e.message + '\n' + e.stack + '</span>');
  }
})();
</script>
</body>
</html>
